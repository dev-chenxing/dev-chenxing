name: Update GitHub Readme Stats cards
on:
    schedule:
        # Hong Kong Time 2:00 AM every week
        - cron: "0 2 */7 * *"
          timezone: Asia/Hong_Kong
    workflow_dispatch: # Allow manual trigger

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write # Required for pushing commits
        steps:
            - uses: actions/checkout@v6

            - name: Generate stats card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: stats
                  options: username=${{ github.repository_owner }}&show_icons=true&theme=graywhite&hide_border=true
                  path: profile/stats.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate top languages card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: top-langs
                  options: username=${{ github.repository_owner }}&layout=compact&theme=graywhite&hide_border=true&langs_count=8
                  path: profile/top-langs.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Commit cards
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  # Check for changes
                  git add profile/*.svg
                  if git diff --staged --quiet; then
                    echo "No stats changes detected. Exiting."
                    exit 0
                  fi

                  # Commit 
                  git commit -m "Update README cards" || exit 0
                  git push
